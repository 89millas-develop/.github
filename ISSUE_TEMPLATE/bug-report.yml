name: Bug Report
description: File a bug report to help us improve the project
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: checkboxes
    id: pre-checks
    attributes:
      label: Pre-submission Checks
      options:
        - label: I have searched existing issues to ensure this hasn't already been reported.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: What operating system are you using? (e.g., Ubuntu 22.04, macOS Sonoma, Windows 11)
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the project are you using?
  - type: input
    id: browser
    attributes:
      label: Browser
      description: What browser are you using? (if applicable)
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (logs, screenshots, etc.).
